services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: aurca_db
    restart: always
    # Docker Compose inyectará automáticamente las variables del .env aquí
    env_file: .env 
    ports:
      - "5433:5432"
    volumes:
      - aurca_db_data:/var/lib/postgresql/data
    networks:
      - aurca_shared_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aurca_agent
    privileged: true
    depends_on:
      timescaledb:
        condition: service_healthy
    # El agente también lee todo el .env
    env_file: .env
    deploy: # <--- ACTIVAR GPU RTX 3060
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    #volumes:
    #- ./src:/app/src
    #- ./src/keys:/app/src/keys:ro
    # Solo dejamos explícita la URL de la DB si queremos sobrescribir el host local 
    # por el nombre del servicio de Docker
    environment:
      - PYTHONPATH=/app:/app/src
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@{DB_HOST}:5432/${POSTGRES_DB}
      - DEBUG_MODE=true
    networks:
      - aurca_shared_net # <--- UNIR A LA RED
  
  miner:
    build:
      context: .
      dockerfile: ${MINER_DOCKERFILE:-docker/miner/Dockerfile}
    container_name: aurca_miner
    restart: always
    env_file: .env 
    ports:
      - "${MINER_WEB_PORT:-9090}:9090"
    environment:
      - BINANCE_MINING_USER=${BINANCE_MINING_USER:-aurcaV01}
      - RIG_NAME=${RIG_NAME:-rig_local}
      - ALGO=${ALGO}
      - CPU_THREADS=${CPU_THREADS:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,display
      - MINER_WEB_PORT=${MINER_WEB_PORT:-9090}
    # Este contenedor es el que realmente exprime la RTX 3060
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-0} # 0 para CPU, 1 para tu Laptop
              capabilities: [gpu]
    networks:
      - aurca_shared_net


volumes:
  aurca_db_data:

networks:
  aurca_shared_net:
    driver: bridge